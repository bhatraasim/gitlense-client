<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GitLense - Login &amp; Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee9d2b",
                        "background-light": "#fdfbf7",
                        "background-dark": "#1a160f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "8px",
                        "xl": "12px",
                        "full": "9999px"
                    },
                },
            },
        }</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(234, 164, 19, 0.15);
        }
        .glow-primary {
            box-shadow: 0 0 25px rgba(234, 164, 19, 0.25);
        }
        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #1a160f 0%, #0a0907 100%);
        }
    </style></head>
<body class="font-display bg-background-dark text-white-text min-h-screen flex items-center justify-center p-4 selection:bg-primary/30 hero-gradient">
<!-- Auth Container -->
<div class="w-full max-w-md glass shadow-2xl rounded-2xl overflow-hidden border border-white/10">
<!-- Header / Logo -->
<div class="p-8 pb-4 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-primary/10 mb-6 shadow-inner">
<span class="material-symbols-outlined text-primary text-5xl">visibility</span>
</div>
<h2 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">GitLense</h2>
<p class="mt-2 text-slate-500 dark:text-slate-400 font-medium">Advanced Insights for your Repositories</p>
<div class="mt-4 inline-flex items-center gap-2 bg-primary/10 border border-primary/20 px-3 py-1 rounded-full">
<img alt="GitHub" class="w-4 h-4 brightness-0 invert opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXuEGTJ2h1Y-YPfbcprJKo-4ZR1sRlSj7b4PrpB9oFmT7ZCDtppH-UHAaYlkKjgVbgylRCkuN17CE86iUYMdFjZffNB4GZSdauv8TvyZC8t5ah_F1ssny5iPGIaQk9OAp6RfTtXtPQFfLZSHzc0RCo7cptt2YMnqKC5aec1NfT7yYNrX1nlNEZE1UEO6KcGXI9lQNxiHmif-fnE0JPWnTBe07W0AeIlDA1Wo2jJMIjMe2Q_Rjtsl6iKTdYarwkaLMyiLFbNuTbCsI"/>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Powered by GitHub</span>
</div>
</div>
<!-- Form Section -->
<div class="px-8 pb-8">
<div class="flex p-1 bg-white/5 rounded-xl mb-8 border border-white/10">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-zinc-800 shadow-sm text-slate-900 dark:text-white transition-all">Sign In</button>
<button class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">Sign Up</button>
</div>
<form action="#" class="space-y-4">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email address</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-white/10 bg-white/5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-500 text-white" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full px-4 py-3 rounded-lg border border-white/10 bg-white/5 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-500 text-white" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary bg-transparent focus:ring-primary/30" id="remember" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember">Keep me signed in</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:brightness-110 text-background-dark font-bold py-3.5 rounded-xl transition-all duration-200 glow-primary mt-4 active:scale-[0.98] text-sm tracking-wide" type="submit">
                    Sign in
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 dark:bg-background-dark text-slate-500 bg-[#111] px-2 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-white/10 rounded-lg hover:bg-white/5 transition-colors text-white">
<img alt="GitHub Logo" class="w-5 h-5 brightness-0 invert" data-alt="GitHub monochrome logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXuEGTJ2h1Y-YPfbcprJKo-4ZR1sRlSj7b4PrpB9oFmT7ZCDtppH-UHAaYlkKjgVbgylRCkuN17CE86iUYMdFjZffNB4GZSdauv8TvyZC8t5ah_F1ssny5iPGIaQk9OAp6RfTtXtPQFfLZSHzc0RCo7cptt2YMnqKC5aec1NfT7yYNrX1nlNEZE1UEO6KcGXI9lQNxiHmif-fnE0JPWnTBe07W0AeIlDA1Wo2jJMIjMe2Q_Rjtsl6iKTdYarwkaLMyiLFbNuTbCsI"/>
<span class="text-sm font-medium">GitHub</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-white/10 rounded-lg hover:bg-white/5 transition-colors text-white">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEUQmgHax-JplPHhc3xqPTHYHsqjnKYik1MmjQfBi0O76wl5u8jEh40jPZ8fXcc40U45NPxdtASCyljUpRK9Dd4xqtKTctN5BEAK-fPvz2PwN-KpyRFVd_PZGUVDQPM5IjLZQaq8b1K_ifx1riCDQ9oyX8VMApYfHU6RLD2ixv-j2bTmpltCy2bEeIpF_i9WWEATFyKVLGDa-1Wl-Uwljrc-k1yOoN2S8HW9Rj6Fa13euNDtA-ngoAjL6_zsUusNk38CWquFWGdWo"/>
<span class="text-sm font-medium">Google</span>
</button>
</div>
<!-- Registration Link -->
<p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? 
                <a class="font-bold text-primary hover:underline underline-offset-4" href="#">Create account</a>
</p>
</div>
<!-- Footer Accent -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
</div>
<!-- Background Decoration -->
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
